name: Validation

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats shellcheck coreutils

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod

      - name: Run test script
        env:
          ANTEATER_PERF_BYTES_TO_HUMAN_LIMIT_MS: "6000"
          ANTEATER_PERF_GET_FILE_SIZE_LIMIT_MS: "3000"
          BATS_FORMATTER: tap
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: ./scripts/test.sh

  cross-compile:
    name: Cross-compile aa-analyze (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: openbsd
            goarch: amd64
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o "aa-analyze-${GOOS}-${GOARCH}" ./cmd/aa-analyze
          file "aa-analyze-${GOOS}-${GOARCH}"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats coreutils

      - name: Check for unsafe rm usage
        run: |
          echo "Checking for unsafe rm patterns..."
          if grep -r "rm -rf" --include="*.sh" lib/ \
              | grep -v "safe_remove\|validate_path\|# \|echo "; then
            echo "Unsafe rm -rf usage found"
            exit 1
          fi
          echo "OK: no unsafe rm usage found"

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          matches=$(grep -r "password\|secret\|api_key" --include="*.sh" . \
            | grep -v "# \|test" \
            | grep -v -E "lib/core/sudo\.sh|bin/optimize\.sh|lib/clean/user\.sh" \
            || true)
          if [[ -n "$matches" ]]; then
            echo "$matches"
            echo "Potential secrets found"
            exit 1
          fi
          echo "OK: no secrets found"

      - name: Run high-risk path regression tests
        env:
          BATS_FORMATTER: tap
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: bats tests/core_safe_functions.bats tests/purge.bats
