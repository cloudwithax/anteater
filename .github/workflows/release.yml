name: Release

on:
  push:
    tags:
      - 'V*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build aa-analyze (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: openbsd
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN="aa-analyze-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "dist/${BIN}" ./cmd/aa-analyze
          ls -lh "dist/${BIN}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aa-analyze-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/aa-analyze-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  packages:
    name: Build system packages
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    env:
      GOOS: linux
      GOARCH: ${{ matrix.goarch }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod

      - name: Download aa-analyze binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aa-analyze-${{ env.GOOS }}-${{ matrix.goarch }}
          path: dist/

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "NFPM_BIN=$(go env GOPATH)/bin/nfpm" >> "$GITHUB_ENV"

      - name: Build packages
        run: |
          mkdir -p dist/packages
          for FORMAT in deb rpm archlinux; do
            NFPM_ARCH="${{ matrix.goarch }}" \
            VERSION="${GITHUB_REF_NAME#V}" \
            GOOS=linux GOARCH=${{ matrix.goarch }} \
            "$NFPM_BIN" package --config packaging/nfpm.yaml --packager "$FORMAT" --target dist/packages/
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ matrix.goarch }}
          path: dist/packages/*
          retention-days: 1

  release:
    name: Publish Release
    needs: [build, packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout (for source tarball)
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4

      - name: Extract version from tag
        id: tag_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#V}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download aa-analyze artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: aa-analyze-*
          merge-multiple: true

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/packages
          pattern: packages-*
          merge-multiple: true

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/aa-analyze-* release/
          cp dist/packages/*.deb dist/packages/*.rpm dist/packages/*.pkg.tar.zst release/ 2>/dev/null || true

          # Source tarball: bash + Go sources, excluding caches/test fixtures.
          TAG="${{ steps.tag_version.outputs.tag }}"
          tar -czf "release/anteater-${TAG}.tar.gz" \
            --transform "s,^,anteater-${TAG}/," \
            --exclude='.git' --exclude='./release' --exclude='./dist' \
            --exclude='tests/tmp-*' \
            anteater aa install.sh README.md LICENSE Makefile \
            go.mod go.sum bin lib cmd internal scripts packaging

          ls -lh release/

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd release
          sha256sum aa-analyze-* anteater-*.tar.gz *.deb *.rpm *.pkg.tar.zst > SHA256SUMS 2>/dev/null || \
          sha256sum aa-analyze-* "anteater-${{ steps.tag_version.outputs.tag }}.tar.gz" > SHA256SUMS
          cat SHA256SUMS

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            release/aa-analyze-*
            release/anteater-*.tar.gz
            release/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ github.ref_name }}
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
